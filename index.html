<!DOCTYPE html>
<html>
<head>
    <title>Chess RPG 3D</title>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            flex: 3;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #hud {
            flex: 1;
            padding: 20px;
            background: #181818;
            border-left: 2px solid #333;
        }

        #log {
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            background: #101010;
            font-size: 14px;
        }

        #homescreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999999;
        }

        #homescreen input {
            padding: 10px;
            font-size: 20px;
            margin-bottom: 20px;
            width: 250px;
            text-align: center;
        }

        #homescreen button {
            padding: 10px 20px;
            font-size: 22px;
            cursor: pointer;
            background: #00ff88;
            border: none;
            border-radius: 5px;
        }

        #gameover {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="homescreen">
        <h1 style="font-size: 60px;">Chess RPG 3D</h1>
        <input id="playername" placeholder="Enter your name">
        <button id="playbutton">Play</button>
    </div>

    <!-- 3D GAME AREA -->
    <div id="game-container"></div>

    <!-- HUD -->
    <div id="hud">
        <h1>Turn‑Based Chess RPG</h1>
        <div>HP: <span id="hp">20</span></div>
        <div>Attack: <span id="atk">5</span></div>
        <div>Wave: <span id="wave">1</span></div>
        <div>Shield Cooldown: <span id="scd">0</span></div>
        <div>Turn: <span id="turn">Player</span></div>
        <p>Controls: W/A/S/D move, O shoot, P block</p>
        <div id="log"></div>
    </div>

    <!-- GAME OVER -->
    <div id="gameover">
        <h1 style="font-size: 80px; margin: 0;">CHECKMATE</h1>
        <p style="font-size: 24px; opacity: 0.8;">You have been defeated.</p>
    </div>

    <!-- GAME LOGIC -->
    <script src="main.js"></script>

    <!-- 3D RENDERING -->
    <script src="game3d.js"></script>

</body>
</html>
