<!DOCTYPE html>
<html>
<head>
    <title>Chess RPG - Turn Based</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        #game-container {
            flex: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 800px;
        }

        #board {
            width: 480px;
            height: 480px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            transform: rotateX(60deg) translateY(40px);
        }

        .tile {
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dark { background: #444; }
        .light { background: #bbb; color: #000; }

        .player, .enemy {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .player { background: #00ff88; }
        .enemy { background: #ff4444; }

        #hud {
            flex: 1;
            padding: 20px;
            background: #181818;
            border-left: 2px solid #333;
        }

        #log {
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            background: #101010;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="board"></div>
    </div>

    <div id="hud">
        <h1>Turn‑Based Chess RPG</h1>
        <div>HP: <span id="hp">20</span></div>
        <div>Attack: <span id="atk">5</span></div>
        <div>Turn: <span id="turn">Player</span></div>
        <p>Controls: W/A/S/D to move, Space to attack (only on your turn)</p>
        <div id="log"></div>
    </div>

    <script>
        const boardEl = document.getElementById("board");
        const hpEl = document.getElementById("hp");
        const atkEl = document.getElementById("atk");
        const turnEl = document.getElementById("turn");
        const logEl = document.getElementById("log");

        const BOARD_SIZE = 8;

        let player = { x: 0, y: 7, hp: 20, atk: 5 };
        let enemy = { x: 4, y: 3, hp: 10, atk: 3 };

        let tiles = [];
        let playerTurn = true;

        // Create board
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const tile = document.createElement("div");
                tile.classList.add("tile");
                tile.classList.add((x + y) % 2 === 0 ? "light" : "dark");
                tile.dataset.x = x;
                tile.dataset.y = y;
                boardEl.appendChild(tile);
                tiles.push(tile);
            }
        }

        function getTile(x, y) {
            return tiles.find(t => Number(t.dataset.x) === x && Number(t.dataset.y) === y);
        }

        function log(msg) {
            const p = document.createElement("p");
            p.textContent = msg;
            logEl.appendChild(p);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function render() {
            tiles.forEach(t => t.innerHTML = "");

            const pTile = getTile(player.x, player.y);
            const pDiv = document.createElement("div");
            pDiv.classList.add("player");
            pTile.appendChild(pDiv);

            if (enemy.hp > 0) {
                const eTile = getTile(enemy.x, enemy.y);
                const eDiv = document.createElement("div");
                eDiv.classList.add("enemy");
                eTile.appendChild(eDiv);
            }

            hpEl.textContent = player.hp;
            atkEl.textContent = player.atk;
            turnEl.textContent = playerTurn ? "Player" : "Enemy";
        }

        function endPlayerTurn() {
            playerTurn = false;
            render();
            setTimeout(enemyTurn, 600);
        }

        function enemyTurn() {
            if (enemy.hp <= 0) {
                log("Enemy is dead.");
                playerTurn = true;
                render();
                return;
            }

            // If next to player, attack
            if (Math.abs(enemy.x - player.x) + Math.abs(enemy.y - player.y) === 1) {
                player.hp -= enemy.atk;
                log("Enemy attacks you for " + enemy.atk + " damage!");
                if (player.hp <= 0) {
                    log("You died. Game over.");
                }
                playerTurn = true;
                render();
                return;
            }

            // Move enemy toward player
            if (enemy.x < player.x) enemy.x++;
            else if (enemy.x > player.x) enemy.x--;

            if (enemy.y < player.y) enemy.y++;
            else if (enemy.y > player.y) enemy.y--;

            log("Enemy moves to " + enemy.x + "," + enemy.y);

            playerTurn = true;
            render();
        }

        function movePlayer(dx, dy) {
            if (!playerTurn) return;

            const nx = player.x + dx;
            const ny = player.y + dy;

            if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) {
                log("Can't move off board.");
                return;
            }

            player.x = nx;
            player.y = ny;
            log("You move to " + nx + "," + ny);

            endPlayerTurn();
        }

        function attack() {
            if (!playerTurn) return;

            if (player.x === enemy.x && player.y === enemy.y) {
                enemy.hp -= player.atk;
                log("You hit the enemy! Enemy HP: " + enemy.hp);
                if (enemy.hp <= 0) log("Enemy defeated!");
            } else {
                log("No enemy here.");
            }

            endPlayerTurn();
        }

        document.addEventListener("keydown", e => {
            if (!playerTurn) return;

            if (e.key === "w") movePlayer(0, -1);
            if (e.key === "s") movePlayer(0, 1);
            if (e.key === "a") movePlayer(-1, 0);
            if (e.key === "d") movePlayer(1, 0);
            if (e.key === " ") attack();
        });

        render();
        log("Game start! Your turn.");
    </script>

</body>
</html>
