<!DOCTYPE html>
<html>
<head>
    <title>Chess RPG 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            flex: 3;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #hud {
            flex: 1;
            padding: 20px;
            background: #181818;
            border-left: 2px solid #333;
        }

        #log {
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            background: #101010;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="game-container"></div>

    <div id="hud">
        <h1>Chess RPG 3D</h1>
        <div>HP: <span id="hp">20</span></div>
        <div>ATK: <span id="atk">5</span></div>
        <div>Wave: <span id="wave">1</span></div>
        <div>Shield CD: <span id="scd">0</span></div>
        <div>Turn: <span id="turn">Player</span></div>
        <div id="log"></div>
    </div>

    <!-- ORDER MATTERS -->
    <script src="main.js"></script>
    <script src="game3d.js"></script>

</body>
</html>
